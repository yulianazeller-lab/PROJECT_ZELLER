version: '3.8'

services:
  db:
    image: postgres:15
    container_name: darina-db
    environment:
      POSTGRES_DB: darinashop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: darina-app
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/darinashop
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      JWT_SECRET: darina-shop-super-secret-jwt-key-2024
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
