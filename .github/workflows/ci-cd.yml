name: CI/CD
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5s
        steps:
          - uses: actions/checkout@v4
          - uses: actions/setup-java@v4
            with:
              java-version: '17'
              distribution: 'temurin'
              cache: maven
          - name: Create database
            run: PGPASSWORD=test psql -h localhost -U test -c "CREATE DATABASE darinashop;"
          - run: mvn test --no-transfer-progress
            working-directory: darinashop
            env:
              DATABASE_URL: jdbc:postgresql://localhost:5432/darinashop
              DATABASE_USERNAME: test
              DATABASE_PASSWORD: test
              JWT_SECRET: darina-shop-super-secret-jwt-key-2024
          - run: mvn package -DskipTests --no-transfer-progress
            working-directory: darinashop